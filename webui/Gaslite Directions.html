<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gaslite — Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1f1f23; --ink-2:#5f6368; --ink-3:#80868b;
    --line:#e6e8eb; --line-2:#dadce0; --surf:#f7f8fa; --surf-2:#f1f3f4;
    --accent:#1a73e8; --accent-ink:#1558c0; --accent-wash:#e8f0fe;
    --add-bg:#e6f4ea; --add-ink:#137333; --add-bar:#34a853;
    --del-bg:#fce8e6; --del-ink:#c5221f; --del-bar:#ea4335;
    --ui:"Figtree",-apple-system,system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--ui);color:var(--ink);-webkit-font-smoothing:antialiased}
  .d{font-family:var(--ui);color:var(--ink);height:100%;background:#fff}
  .mono{font-family:var(--mono)}
  /* shared atoms */
  .gl-mark{display:inline-flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em}
  .gl-dot{width:18px;height:18px;border-radius:5px;background:var(--accent);position:relative;flex:0 0 auto}
  .gl-dot::after{content:"";position:absolute;inset:5px 7px;background:#fff;border-radius:1px}
  .btn-opt{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;
    font-family:var(--ui);font-weight:600;font-size:14px;padding:9px 18px;border-radius:999px;cursor:pointer;
    box-shadow:0 1px 2px rgba(26,115,232,.3)}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);background:var(--surf-2);
    border:1px solid var(--line);border-radius:999px;padding:5px 12px}
  .kicker{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}

  /* code blocks */
  .code{font-family:var(--mono);font-size:12.5px;line-height:1.65;white-space:pre}
  .ln{display:flex;gap:0}
  .gut{width:30px;flex:0 0 auto;text-align:right;padding-right:12px;color:#b9bcc2;user-select:none}
  .src{flex:1 1 auto;padding-right:10px}
  .ln.add{background:var(--add-bg)}
  .ln.del{background:var(--del-bg)}
  .ln.add .gut{color:var(--add-bar)} .ln.del .gut{color:var(--del-bar)}
  .ln.add .sign{color:var(--add-ink)} .ln.del .sign{color:var(--del-ink)}
  .sign{display:inline-block;width:12px}
  .kw{color:#8430ce}.ty{color:#1a73e8}.fn{color:#0b8043}.nm{color:#1f1f23}.cm{color:#9aa0a6}.st{color:#c5221f}.nu{color:#b06000}

  /* stat cards */
  .stat{border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:#fff}
  .stat .lab{font-size:11.5px;font-weight:600;color:var(--ink-3);letter-spacing:.02em}
  .stat .big{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:6px;line-height:1}
  .stat .sub{font-size:12px;color:var(--ink-2);margin-top:7px}
  .pos{color:var(--add-ink)}
  .pill-save{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--add-ink);
    background:var(--add-bg);border-radius:999px;padding:2px 9px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* ---------- shared content fragments ---------- */
function OrigCode(){return(
  <div className="code">
    <div className="ln"><span className="gut">14</span><span className="src"><span className="kw">function</span> <span className="fn">distribute</span>(<span className="ty">address</span>[] <span className="kw">memory</span> users) <span className="kw">public</span> {'{'}</span></div>
    <div className="ln"><span className="gut">15</span><span className="src">  <span className="kw">for</span> (<span className="ty">uint256</span> i = <span className="nu">0</span>; i {'<'} users.length; i++) {'{'}</span></div>
    <div className="ln"><span className="gut">16</span><span className="src">    <span className="ty">uint256</span> reward = rewards[users[i]];</span></div>
    <div className="ln"><span className="gut">17</span><span className="src">    <span className="fn">require</span>(reward {'>'} <span className="nu">0</span>, <span className="st">"no reward"</span>);</span></div>
    <div className="ln"><span className="gut">18</span><span className="src">    balances[users[i]] += reward;</span></div>
    <div className="ln"><span className="gut">19</span><span className="src">  {'}'}</span></div>
    <div className="ln"><span className="gut">20</span><span className="src">{'}'}</span></div>
  </div>
)}
function OptCode(){return(
  <div className="code">
    <div className="ln del"><span className="gut">14</span><span className="src"><span className="sign">-</span><span className="kw">function</span> <span className="fn">distribute</span>(<span className="ty">address</span>[] <span className="kw">memory</span> users) <span className="kw">public</span> {'{'}</span></div>
    <div className="ln add"><span className="gut">14</span><span className="src"><span className="sign">+</span><span className="kw">function</span> <span className="fn">distribute</span>(<span className="ty">address</span>[] <span className="kw">calldata</span> users) <span className="kw">external</span> {'{'}</span></div>
    <div className="ln add"><span className="gut">15</span><span className="src"><span className="sign">+</span>  <span className="ty">uint256</span> len = users.length;</span></div>
    <div className="ln del"><span className="gut">15</span><span className="src"><span className="sign">-</span>  <span className="kw">for</span> (<span className="ty">uint256</span> i = <span className="nu">0</span>; i {'<'} users.length; i++) {'{'}</span></div>
    <div className="ln add"><span className="gut">16</span><span className="src"><span className="sign">+</span>  <span className="kw">for</span> (<span className="ty">uint256</span> i; i {'<'} len;) {'{'}</span></div>
    <div className="ln"><span className="gut">17</span><span className="src">    <span className="ty">uint256</span> reward = rewards[users[i]];</span></div>
    <div className="ln del"><span className="gut">17</span><span className="src"><span className="sign">-</span>    <span className="fn">require</span>(reward {'>'} <span className="nu">0</span>, <span className="st">"no reward"</span>);</span></div>
    <div className="ln add"><span className="gut">18</span><span className="src"><span className="sign">+</span>    <span className="kw">if</span> (reward == <span className="nu">0</span>) <span className="kw">revert</span> <span className="fn">NoReward</span>();</span></div>
    <div className="ln"><span className="gut">19</span><span className="src">    balances[users[i]] += reward;</span></div>
    <div className="ln add"><span className="gut">20</span><span className="src"><span className="sign">+</span>    <span className="kw">unchecked</span> {'{'} ++i; {'}'}</span></div>
    <div className="ln"><span className="gut">21</span><span className="src">  {'}'}</span></div>
  </div>
)}

function MiniGraph({w=300,h=140,pad=18}){
  // original (flat-high) vs optimized (lower) cumulative gas across runs
  const ox=[pad,pad+ (w-2*pad)*0.33,pad+(w-2*pad)*0.66,w-pad];
  const orig=[h-pad-18,h-pad-44,h-pad-78,h-pad-112];
  const opt =[h-pad-12,h-pad-30,h-pad-52,h-pad-74];
  const line=(ys)=>ys.map((y,i)=>`${ox[i]},${y}`).join(" ");
  return(
    <svg width={w} height={h} style={{display:"block"}}>
      <line x1={pad} y1={h-pad} x2={w-pad} y2={h-pad} stroke="#e6e8eb"/>
      <polyline points={line(orig)} fill="none" stroke="#c5221f" strokeWidth="2"/>
      <polyline points={line(opt)} fill="none" stroke="#1a73e8" strokeWidth="2.4"/>
      {ox.map((x,i)=>(<circle key={i} cx={x} cy={opt[i]} r="2.6" fill="#1a73e8"/>))}
      {["1","10","100","1k"].map((t,i)=>(<text key={t} x={ox[i]} y={h-5} fontSize="9.5" fill="#80868b" textAnchor="middle" fontFamily="JetBrains Mono">{t}</text>))}
    </svg>
  );
}

/* ================= DIRECTION 1 — STUDIO ================= */
function DirStudio(){
  return(
   <div className="d" style={{display:"flex",flexDirection:"column"}}>
    <div style={{height:58,display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"0 22px",borderBottom:"1px solid var(--line)"}}>
      <div style={{display:"flex",alignItems:"center",gap:18}}>
        <span className="gl-mark" style={{fontSize:18}}><span className="gl-dot"></span>Gaslite</span>
        <span className="chip mono"><span style={{width:7,height:7,borderRadius:9,background:"#34a853",display:"inline-block"}}></span>RewardPool.sol</span>
      </div>
      <button className="btn-opt">✦ Optimize</button>
    </div>
    <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr 320px",minHeight:0}}>
      {/* original */}
      <div style={{borderRight:"1px solid var(--line)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"11px 18px",borderBottom:"1px solid var(--line)",fontSize:12,fontWeight:600,color:"var(--ink-2)",display:"flex",justifyContent:"space-between"}}>
          <span>Original</span><span className="mono" style={{color:"var(--ink-3)"}}>baseline</span></div>
        <div style={{padding:"16px 6px",overflow:"hidden"}}><OrigCode/></div>
      </div>
      {/* optimized */}
      <div style={{borderRight:"1px solid var(--line)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"11px 18px",borderBottom:"1px solid var(--line)",fontSize:12,fontWeight:600,color:"var(--ink-2)",display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"var(--accent-ink)"}}>Optimized by Gaslite</span><span className="pill-save">−31%</span></div>
        <div style={{padding:"16px 6px",overflow:"hidden"}}><OptCode/></div>
      </div>
      {/* rail */}
      <div style={{background:"var(--surf)",padding:18,display:"flex",flexDirection:"column",gap:12,overflow:"hidden"}}>
        <div className="kicker">Summary</div>
        <div className="stat" style={{background:"var(--accent)",border:"none",color:"#fff"}}>
          <div className="lab" style={{color:"rgba(255,255,255,.8)"}}>Total gas saved</div>
          <div className="big">41%</div>
          <div className="sub" style={{color:"rgba(255,255,255,.85)"}}>across 6 functions</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="stat"><div className="lab">Deploy cost</div><div className="big" style={{fontSize:23}}>−32%</div><div className="sub mono">2.42M→1.64M</div></div>
          <div className="stat"><div className="lab">Per call</div><div className="big" style={{fontSize:23}}>−31%</div><div className="sub mono">distribute()</div></div>
        </div>
        <div className="stat"><div className="lab">Est. cost saved</div><div className="big" style={{fontSize:23}}>$0.0123<span style={{fontSize:12,color:"var(--ink-3)",fontWeight:600}}> /1k calls</span></div><div className="sub mono">≈ 0.41 MNT</div></div>
        <div className="stat" style={{flex:1}}><div className="lab" style={{marginBottom:8}}>Cumulative gas · runs</div><MiniGraph w={272} h={130}/></div>
      </div>
    </div>
   </div>
  );
}

/* ================= DIRECTION 2 — REPORT ================= */
function DirReport(){
  const tiles=[["Total gas saved","41%","6 functions optimized"],["Deploy cost","−32%","2.42M → 1.64M gas"],["Per call · distribute()","−31%","12,480 gas saved"],["Cost / 1k calls","$0.0123","≈ 0.41 MNT"]];
  return(
   <div className="d" style={{padding:"0",overflow:"hidden"}}>
    <div style={{maxWidth:980,margin:"0 auto",padding:"40px 40px 30px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span className="gl-mark" style={{fontSize:17}}><span className="gl-dot"></span>Gaslite</span>
        <span className="chip mono">RewardPool.sol</span>
      </div>
      <div style={{marginTop:46,textAlign:"center"}}>
        <div className="kicker" style={{marginBottom:14}}>Optimization complete</div>
        <div style={{fontSize:74,fontWeight:800,letterSpacing:"-.04em",lineHeight:1}}>
          <span style={{color:"var(--accent)"}}>41%</span> less gas</div>
        <div style={{fontSize:16,color:"var(--ink-2)",marginTop:16,maxWidth:520,marginInline:"auto"}}>
          Gaslite rewrote 6 functions using storage caching, calldata, custom errors and unchecked math — preserving identical behaviour.</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginTop:40}}>
        {tiles.map(([l,b,s],i)=>(
          <div key={i} className="stat" style={{textAlign:"center",padding:"20px 14px"}}>
            <div className="lab">{l}</div><div className="big" style={{fontSize:30,color:i===0?"var(--accent)":"var(--ink)"}}>{b}</div>
            <div className="sub mono">{s}</div></div>))}
      </div>
      <div style={{marginTop:24,border:"1px solid var(--line)",borderRadius:16,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
          <div style={{borderRight:"1px solid var(--line)"}}>
            <div style={{padding:"11px 18px",borderBottom:"1px solid var(--line)",fontSize:12,fontWeight:600,color:"var(--ink-2)"}}>Original</div>
            <div style={{padding:"14px 8px"}}><OrigCode/></div></div>
          <div>
            <div style={{padding:"11px 18px",borderBottom:"1px solid var(--line)",fontSize:12,fontWeight:600,color:"var(--accent-ink)",display:"flex",justifyContent:"space-between"}}><span>Optimized</span><span className="pill-save">−31%</span></div>
            <div style={{padding:"14px 8px"}}><OptCode/></div></div>
        </div>
      </div>
    </div>
   </div>
  );
}

/* ================= DIRECTION 3 — CONSOLE (dark editor) ================= */
function DarkCode({opt}){
  const C={kw:"#c792ea",ty:"#82aaff",fn:"#82d49b",nu:"#f78c6c",st:"#ecc48d",cm:"#6b7280",base:"#c8ccd4"};
  const L=(g,children,kind)=>(
    <div className="ln" style={{background:kind==="add"?"rgba(52,168,83,.16)":kind==="del"?"rgba(234,67,53,.15)":"transparent"}}>
      <span className="gut" style={{color:"#5a6270"}}>{g}</span><span className="src" style={{color:C.base}}>{children}</span></div>);
  return(
   <div className="code" style={{color:C.base}}>
     {opt? <>
       {L("-",<><span style={{color:C.kw}}>function</span> <span style={{color:C.fn}}>distribute</span>(<span style={{color:C.ty}}>address</span>[] <span style={{color:C.kw}}>memory</span>…)</>,"del")}
       {L("+",<><span style={{color:C.kw}}>function</span> <span style={{color:C.fn}}>distribute</span>(<span style={{color:C.ty}}>address</span>[] <span style={{color:C.kw}}>calldata</span>…)</>,"add")}
       {L("+",<>  <span style={{color:C.ty}}>uint256</span> len = users.length;</>,"add")}
       {L("16",<>  <span style={{color:C.kw}}>for</span> (<span style={{color:C.ty}}>uint256</span> i; i {'<'} len;) {'{'}</>)}
       {L("17",<>    <span style={{color:C.ty}}>uint256</span> reward = rewards[users[i]];</>)}
       {L("+",<>    <span style={{color:C.kw}}>if</span> (reward==<span style={{color:C.nu}}>0</span>) <span style={{color:C.kw}}>revert</span> <span style={{color:C.fn}}>NoReward</span>();</>,"add")}
       {L("19",<>    balances[users[i]] += reward;</>)}
       {L("+",<>    <span style={{color:C.kw}}>unchecked</span> {'{'} ++i; {'}'}</>,"add")}
     </> : <>
       {L("14",<><span style={{color:C.kw}}>function</span> <span style={{color:C.fn}}>distribute</span>(<span style={{color:C.ty}}>address</span>[] <span style={{color:C.kw}}>memory</span>…)</>)}
       {L("15",<>  <span style={{color:C.kw}}>for</span> (<span style={{color:C.ty}}>uint256</span> i=<span style={{color:C.nu}}>0</span>; i{'<'}users.length; i++) {'{'}</>)}
       {L("16",<>    <span style={{color:C.ty}}>uint256</span> reward = rewards[users[i]];</>)}
       {L("17",<>    <span style={{color:C.fn}}>require</span>(reward{'>'}<span style={{color:C.nu}}>0</span>, <span style={{color:C.st}}>"no reward"</span>);</>)}
       {L("18",<>    balances[users[i]] += reward;</>)}
       {L("19",<>  {'}'}</>)}
     </>}
   </div>
  );
}
function DirConsole(){
  const nav=["Editor","Diff","Simulate","Report"];
  const kpis=[["Gas saved","41%","var(--accent)"],["Deploy","−32%","var(--ink)"],["Per call","−31%","var(--ink)"],["Saved /1k","$0.012","var(--ink)"]];
  return(
   <div className="d" style={{display:"flex"}}>
    <div style={{width:72,borderRight:"1px solid var(--line)",padding:"18px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"var(--surf)"}}>
      <span className="gl-dot" style={{width:26,height:26,marginBottom:14}}></span>
      {nav.map((n,i)=>(<div key={n} style={{fontSize:10,fontWeight:600,color:i===1?"var(--accent)":"var(--ink-3)",
        width:56,textAlign:"center",padding:"9px 0",borderRadius:8,background:i===1?"var(--accent-wash)":"transparent"}}>
        <div style={{width:18,height:18,borderRadius:5,border:`1.6px solid ${i===1?"var(--accent)":"#c2c6cc"}`,margin:"0 auto 5px"}}></div>{n}</div>))}
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
      <div style={{height:52,borderBottom:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontWeight:700,fontSize:15}}>RewardPool.sol</span><span className="chip mono" style={{padding:"3px 9px"}}>Mantle</span></div>
        <button className="btn-opt" style={{padding:"7px 15px",fontSize:13}}>✦ Optimize</button>
      </div>
      {/* kpi strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",borderBottom:"1px solid var(--line)"}}>
        {kpis.map(([l,b,c],i)=>(<div key={i} style={{padding:"13px 20px",borderRight:i<3?"1px solid var(--line)":"none"}}>
          <div className="lab" style={{fontSize:11,color:"var(--ink-3)",fontWeight:600}}>{l}</div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.03em",color:c,marginTop:3}}>{b}</div></div>))}
      </div>
      <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 360px",minHeight:0}}>
        {/* dark editors */}
        <div style={{display:"grid",gridTemplateRows:"1fr 1fr",background:"#1e2128"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #2c303a"}}>
            <div style={{fontSize:11,color:"#7d8694",fontWeight:600,marginBottom:8,fontFamily:"var(--mono)"}}>// original</div><DarkCode opt={false}/></div>
          <div style={{padding:"12px 16px"}}>
            <div style={{fontSize:11,color:"#82d49b",fontWeight:600,marginBottom:8,fontFamily:"var(--mono)"}}>// optimized · −31%</div><DarkCode opt={true}/></div>
        </div>
        {/* sim panel */}
        <div style={{borderLeft:"1px solid var(--line)",padding:18,display:"flex",flexDirection:"column",gap:14}}>
          <div className="kicker">Simulation</div>
          <div className="stat" style={{padding:"14px 16px"}}><div className="lab" style={{marginBottom:8}}>Cumulative gas vs runs</div><MiniGraph w={300} h={132}/></div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--ink-2)",marginBottom:7}}><span>Run count</span><span className="mono" style={{fontWeight:600,color:"var(--ink)"}}>100</span></div>
            <div style={{height:4,background:"var(--surf-2)",borderRadius:9,position:"relative"}}><div style={{position:"absolute",left:0,top:0,bottom:0,width:"58%",background:"var(--accent)",borderRadius:9}}></div>
              <div style={{position:"absolute",left:"58%",top:"50%",width:14,height:14,marginTop:-7,marginLeft:-7,borderRadius:9,background:"#fff",border:"2px solid var(--accent)",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}></div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div className="stat" style={{padding:"12px 14px"}}><div className="lab">Before</div><div className="big mono" style={{fontSize:18}}>3.18M</div></div>
            <div className="stat" style={{padding:"12px 14px",borderColor:"var(--add-bar)"}}><div className="lab">After</div><div className="big mono pos" style={{fontSize:18}}>1.88M</div></div>
          </div>
        </div>
      </div>
    </div>
   </div>
  );
}

/* ---------- canvas ---------- */
function App(){
  return(
    <DesignCanvas>
      <DCSection id="dirs" title="Gaslite — Three Directions" subtitle="Same content, three visual/layout treatments. Pick one (or mix) and I'll build it fully interactive.">
        <DCArtboard id="studio" label="A · Studio — IDE layout, light, stat rail" width={1180} height={620}><DirStudio/></DCArtboard>
        <DCArtboard id="report" label="B · Report — airy, Gemini-result feel" width={1060} height={760}><DirReport/></DCArtboard>
        <DCArtboard id="console" label="C · Console — dense, dark editor, dev tool" width={1180} height={620}><DirConsole/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
